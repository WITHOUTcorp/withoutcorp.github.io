<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WITHOUT terminal virtual machine</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,interactive-widget=resizes-content">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <script>
        var db;
        const DB_NAME = '/saves'
        const DB_VERSION = 21;
        const DB_STORE_NAME = "FILE_DATA";
        idb.openDB(DB_NAME, DB_VERSION).then((result) => { db = result } );
    </script>
</head>
<body>
    <div id="col">
        <!-- <div id="heading">
            <input type="button" id="openScript" value="Open Script" class="arcadeButton" />
            <script src="openScript.js"></script>
        </div> -->
        <div id="inner">
            <div id="game">
                <div id="arcade" style="visibility:hidden;">
                    <script>
                        setTimeout(function(){
                            document.getElementById('arcade').style.visibility = "visible";
                        },5000);
                    </script>
                    <input type="button" id="openScript" value="Open Script" class="arcadeButton" />
                    <script>
                        var startButton = document;
                        .querySelector("#openScript");
                        .addEventListener("click", () => {
                            this.openScript();
                        });
                        // Function that start game
                        openScript = () => {
                            console.log("Placeholder");
                            // Let us open our database
                            const tx = db.transaction(DB_STORE_NAME, /* '/saves' */ 'readwrite');
                            const store = tx.objectStore(DB_STORE_NAME /* '/saves' */);
                            const val = store.get("/saves/with.scr").then((result) => {
                                let newStr = Buffer.from(Object.values(result.contents)).toString();
                                /* result */ newStr.contents.split(/\n/).forEach((el) => { let p = document.createElement('p'); let text = document.createTextNode(el); p.appendChild(text); main.appendChild(p)})
                            });
                        };
                    </script>
                </div>
                <canvas id="canvas" height="500"></canvas>
                <textarea id="textinput" autocapitalize="on" rows="1"></textarea>
            </div>
        </div>
    </div>
    <script>window.files = ["with.z8", "with.blb"]</script>
    <script type="text/javascript" src="interface.js"></script>
    <script async type="text/javascript" src="sfrotz.js"></script>
  </body>
</html>
